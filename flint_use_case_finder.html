<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flint — Use Case Finder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2f45;
    --navy-light: #243b55;
    --gold: #c9954c;
    --gold-light: #e8b97a;
    --cream: #f7f4ef;
    --cream-dark: #ede8e0;
    --text: #1a1a1a;
    --text-mid: #4a4a4a;
    --text-muted: #888;
    --border: rgba(0,0,0,0.10);
    --white: #ffffff;
    --success: #2d6a4f;
    --success-bg: #e8f5ee;
    --tag-safety: #1b3a4b;
    --tag-sales: #3d1a45;
    --tag-sop: #1a3a1a;
    --tag-leadership: #3a2800;
    --tag-onboarding: #1a1a3a;
    --tag-ai: #2a1a1a;
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--navy-light);
  }
  .header-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .header-logo span { color: var(--gold); }
  .header-subtitle {
    font-size: 12px;
    color: rgba(247,244,239,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  /* ── LAYOUT ── */
  .app { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }

  /* ── PROGRESS ── */
  .progress-bar {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 48px;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--cream-dark);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    transition: all 0.3s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .step-dot.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--cream);
  }
  .step-dot.done {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--white);
  }
  .step-dot.done::after {
    content: '';
    display: block;
    width: 10px; height: 6px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }
  .step-dot.done span { display: none; }
  .step-line {
    flex: 1;
    height: 2px;
    background: var(--cream-dark);
    transition: background 0.3s ease;
  }
  .step-line.done { background: var(--gold); }

  /* ── WIZARD CARD ── */
  .wizard-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 44px;
    box-shadow: 0 2px 24px rgba(13,27,42,0.06);
  }

  .step-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .step-question {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  .step-hint {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* ── OPTION GRID ── */
  .option-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 36px;
  }

  .option-btn {
    background: var(--cream);
    border: 1.5px solid var(--cream-dark);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s ease;
    position: relative;
    font-family: 'DM Sans', sans-serif;
  }
  .option-btn:hover {
    border-color: var(--navy-light);
    background: var(--white);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(13,27,42,0.08);
  }
  .option-btn.selected {
    border-color: var(--navy);
    background: var(--navy);
  }
  .option-btn.selected .opt-label { color: var(--cream); }
  .option-btn.selected .opt-desc { color: rgba(247,244,239,0.6); }
  .option-btn.selected .opt-icon { background: rgba(255,255,255,0.15); color: var(--cream); }

  .opt-icon {
    width: 32px; height: 32px;
    background: var(--white);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .opt-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .opt-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* ── NAV ── */
  .wizard-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 28px;
    border-top: 1px solid var(--cream-dark);
  }
  .btn-back {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 0;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.15s;
  }
  .btn-back:hover { color: var(--text); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }

  .btn-next {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    background: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.35; cursor: default; transform: none; }
  .btn-next.cta {
    background: var(--gold);
    color: var(--white);
    padding: 13px 32px;
    font-size: 15px;
  }
  .btn-next.cta:hover { background: var(--gold-light); }

  /* ── RESULTS ── */
  .results-header {
    margin-bottom: 32px;
  }
  .results-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .results-summary {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.6;
    max-width: 580px;
  }

  .results-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 36px 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .results-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cream-dark);
  }

  .case-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 14px;
    transition: box-shadow 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .case-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--navy);
    border-radius: 4px 0 0 4px;
  }
  .case-card.tier2::before { background: var(--gold); }
  .case-card:hover { box-shadow: 0 4px 20px rgba(13,27,42,0.10); }

  .case-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }
  .case-identity {}
  .case-customer {
    font-size: 17px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.2;
  }
  .case-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .match-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .match-strong {
    background: #e8f3e8;
    color: #1a4a1a;
  }
  .match-good {
    background: #fef3e2;
    color: #5a3800;
  }

  .fit-reason {
    font-size: 13.5px;
    color: var(--text-mid);
    line-height: 1.55;
    margin-bottom: 14px;
    padding: 12px 14px;
    background: var(--cream);
    border-radius: 8px;
    border-left: 3px solid var(--cream-dark);
  }

  .case-details {
    display: none;
  }
  .case-details.open { display: block; }

  .detail-section { margin-bottom: 14px; }
  .detail-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .detail-text {
    font-size: 13.5px;
    color: var(--text-mid);
    line-height: 1.55;
  }

  .case-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--cream-dark);
    flex-wrap: wrap;
    gap: 10px;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: 0.04em;
  }
  .tag-safety   { background: #dce8f0; color: #0d2d40; }
  .tag-sales    { background: #ede0f5; color: #3a1048; }
  .tag-sop      { background: #ddf0dd; color: #103410; }
  .tag-leadership { background: #fef0d8; color: #3a2000; }
  .tag-onboarding { background: #dde0f5; color: #10103a; }
  .tag-ai       { background: #f0dddd; color: #3a1010; }

  .case-links { display: flex; gap: 10px; align-items: center; }
  .case-link {
    font-size: 12px;
    font-weight: 500;
    color: var(--navy);
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .case-link:hover { border-color: var(--navy); background: var(--navy); color: var(--white); }

  .expand-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 0;
    display: flex; align-items: center; gap: 4px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .expand-btn:hover { color: var(--gold-light); }

  .restart-bar {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--cream-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .restart-text { font-size: 14px; color: var(--text-muted); }
  .btn-restart {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    background: var(--white);
    border: 1.5px solid var(--navy);
    border-radius: 8px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-restart:hover { background: var(--navy); color: var(--white); }

  .no-results {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
  }
  .no-results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--navy);
    margin-bottom: 10px;
  }

  .selection-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .sel-chip {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    background: var(--navy);
    color: var(--cream);
    border-radius: 20px;
  }
  .sel-chip-label {
    opacity: 0.55;
    margin-right: 4px;
  }

  @media (max-width: 600px) {
    .app { padding: 28px 16px 60px; }
    .wizard-card { padding: 28px 20px; }
    .step-question { font-size: 22px; }
    .option-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

let answers = {};
let currentStep = 0;
let expandedCards = new Set();

function scoreCase(c) {
  let score = 0;
  let reasons = [];

  const ind = answers.industry;
  const probs = answers.problem || [];
  const aud = answers.audience;
  const sz = answers.size;
  const stg = answers.stage;

  const industryMatch = c.industry.includes(ind) || ind === 'other';
  const probMatches = probs.filter(p => c.problem.includes(p));
  const audMatch = c.audience.includes(aud);
  const sizeMatch = c.size.includes(sz) || sz === 'unknown';
  const stageMatch = c.stage.includes(stg);

  if (industryMatch) {
    score += c.industry.includes(ind) ? 3 : 1;
    if (c.industry.includes(ind) && ind !== 'other') reasons.push(`same-industry example (${getLabel('industry', ind)})`);
  }

  if (probMatches.length > 0) {
    score += probMatches.length * 4;
    const problemLabels = probMatches.map(p => getLabel('problem', p)).join(' and ');
    reasons.push(`directly addresses the core problem: ${problemLabels}`);
  }

  if (audMatch) { score += 2; reasons.push(`same audience type (${getLabel('audience', aud)})`); }
  if (sizeMatch && sz !== 'unknown') { score += 1; }
  if (stageMatch) { score += 1; }
  if (c.completeness === 'Rich') { score += 1; }
  if (c.status === 'Completed') { score += 0.5; reasons.push('completed initiative with documented outcomes'); }
  if (c.htmlLinks && c.htmlLinks.length > 0) { score += 0.5; reasons.push('presentation materials available'); }

  return { score, reasons };
}

function getLabel(stepId, value) {
  const step = STEPS.find(s => s.id === stepId);
  if (!step) return value;
  const opt = step.options.find(o => o.value === value);
  return opt ? opt.label : value;
}

function generateFitReason(c, reasons, score) {
  const ind = answers.industry;
  const probs = answers.problem || [];
  const stg = answers.stage;

  let text = '';

  const industryMatch = c.industry.includes(ind) && ind !== 'other';
  const probMatches = probs.filter(p => c.problem.includes(p));

  if (industryMatch) {
    text += `${c.customer} is operating in the same space — `;
  } else {
    text += `While the industry differs, ${c.customer} is a strong analog — `;
  }

  if (probMatches.length > 0) {
    const labels = probMatches.map(p => getLabel('problem', p));
    if (labels.length === 1) text += `they faced the same core challenge of ${labels[0].toLowerCase()}`;
    else text += `they faced both ${labels.slice(0,-1).join(', ')} and ${labels[labels.length-1].toLowerCase()}`;
    text += '. ';
  }

  if (c.status === 'Completed') {
    text += 'This initiative has concluded and results were documented, making it useful for outcome-oriented conversations. ';
  } else if (c.status === 'Launched') {
    text += 'This initiative is currently active, which means the use case is current and the story is still being built. ';
  }

  if (stg === 'proof' && c.completeness === 'Rich') {
    text += 'The charter is complete with well-defined outcomes and ROI framing — useful for a late-stage proof conversation.';
  } else if (stg === 'pilot' && c.htmlLinks && c.htmlLinks.length > 0) {
    text += 'Presentation materials are available — use these to show a prospect what a Flint engagement looks like in context.';
  } else if (stg === 'awareness') {
    text += 'Use this to help the prospect see how a comparable organization framed the problem and justified the investment.';
  }

  return text;
}

function renderStep(stepIndex) {
  const step = STEPS[stepIndex];
  const isLast = stepIndex === STEPS.length - 1;

  const progressDots = STEPS.map((s, i) => {
    let cls = '';
    if (i < stepIndex) cls = 'done';
    else if (i === stepIndex) cls = 'active';
    return `<div class="step-dot ${cls}"><span>${i+1}</span></div>${i < STEPS.length - 1 ? `<div class="step-line ${i < stepIndex ? 'done' : ''}"></div>` : ''}`;
  }).join('');

  const currentVal = answers[step.id];
  const optionsHtml = step.options.map(opt => {
    const isSelected = step.multi
      ? (Array.isArray(currentVal) && currentVal.includes(opt.value))
      : currentVal === opt.value;
    return `<button class="option-btn ${isSelected ? 'selected' : ''}" data-value="${opt.value}" onclick="selectOption('${step.id}', '${opt.value}', ${step.multi})">
      <div class="opt-icon">${opt.icon}</div>
      <div class="opt-label">${opt.label}</div>
      <div class="opt-desc">${opt.desc}</div>
    </button>`;
  }).join('');

  const hasSelection = step.multi
    ? (Array.isArray(currentVal) && currentVal.length > 0)
    : !!currentVal;

  document.getElementById('wizard').innerHTML = `
    <div class="progress-bar">${progressDots}</div>
    <div class="wizard-card">
      <div class="step-eyebrow">${step.eyebrow}</div>
      <div class="step-question">${step.question}</div>
      <div class="step-hint">${step.hint}${step.multi ? ' <strong>Select all that apply.</strong>' : ''}</div>
      <div class="option-grid">${optionsHtml}</div>
      <div class="wizard-nav">
        <button class="btn-back" onclick="goBack()" ${stepIndex === 0 ? 'disabled' : ''}>← Back</button>
        <button class="btn-next ${isLast ? 'cta' : ''}" onclick="goNext()" ${!hasSelection ? 'disabled' : ''}>
          ${isLast ? 'Find matching use cases →' : 'Continue →'}
        </button>
      </div>
    </div>
  `;
}

function selectOption(stepId, value, multi) {
  if (multi) {
    if (!Array.isArray(answers[stepId])) answers[stepId] = [];
    const idx = answers[stepId].indexOf(value);
    if (idx === -1) answers[stepId].push(value);
    else answers[stepId].splice(idx, 1);
  } else {
    answers[stepId] = value;
  }
  renderStep(currentStep);
}

function goNext() {
  const step = STEPS[currentStep];
  const val = answers[step.id];
  const hasSelection = step.multi ? (Array.isArray(val) && val.length > 0) : !!val;
  if (!hasSelection) return;

  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep(currentStep);
  } else {
    renderResults();
  }
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
  }
}

function renderResults() {
  const scored = CASES.map(c => {
    const { score, reasons } = scoreCase(c);
    return { ...c, score, reasons };
  }).filter(c => c.score > 0).sort((a, b) => b.score - a.score);

  const strong = scored.filter(c => c.score >= 7);
  const good = scored.filter(c => c.score >= 3 && c.score < 7);

  const industryLabel = getLabel('industry', answers.industry);
  const probLabels = (answers.problem || []).map(p => getLabel('problem', p));
  const audLabel = getLabel('audience', answers.audience);

  const selChips = [
    `<span class="sel-chip"><span class="sel-chip-label">industry</span>${industryLabel}</span>`,
    ...probLabels.map(l => `<span class="sel-chip"><span class="sel-chip-label">problem</span>${l}</span>`),
    `<span class="sel-chip"><span class="sel-chip-label">audience</span>${audLabel}</span>`,
  ].join('');

  function renderCard(c, tier) {
    const fit = generateFitReason(c, c.reasons, c.score);
    const isExpanded = expandedCards.has(c.customer + c.initiative);

    const tagHtml = c.types.map(t => `<span class="tag ${TAG_CLASSES[t] || ''}">${t}</span>`).join('');
    const linksHtml = [
      c.charterUrl ? `<a class="case-link" href="${c.charterUrl}" target="_blank">Charter</a>` : '',
      ...(c.htmlLinks || []).map(l => `<a class="case-link" href="${l.url}" target="_blank">${l.label}</a>`)
    ].filter(Boolean).join('');

    const statusColor = c.status === 'Completed' ? '#2d6a4f' : c.status === 'Launched' ? '#185fa5' : '#7a5500';
    const statusDot = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${statusColor};margin-right:5px;vertical-align:middle;"></span>`;

    return `<div class="case-card ${tier === 'good' ? 'tier2' : ''}">
      <div class="case-top">
        <div class="case-identity">
          <div class="case-customer">${c.customer}</div>
          <div class="case-meta">${c.initiative} · ${c.audienceDesc} · ${c.audienceSize} people · ${statusDot}${c.status}</div>
        </div>
        <span class="match-badge ${tier === 'strong' ? 'match-strong' : 'match-good'}">${tier === 'strong' ? 'Strong match' : 'Good match'}</span>
      </div>
      <div class="fit-reason">${fit}</div>
      <div class="case-details ${isExpanded ? 'open' : ''}" id="details-${c.customer.replace(/\s+/g,'-')}-${c.initiative.replace(/\s+/g,'-')}">
        <div class="detail-section">
          <div class="detail-label">Purpose</div>
          <div class="detail-text">${c.purpose}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Desired outcomes</div>
          <div class="detail-text">${c.outcomes}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">ROI framing</div>
          <div class="detail-text">${c.roi}</div>
        </div>
      </div>
      <div class="case-footer">
        <div class="tags">${tagHtml}</div>
        <div class="case-links">
          ${linksHtml}
          <button class="expand-btn" onclick="toggleExpand('${c.customer}', '${c.initiative}', this)">
            ${isExpanded ? '↑ Less detail' : '↓ Full detail'}
          </button>
        </div>
      </div>
    </div>`;
  }

  const strongHtml = strong.length > 0
    ? `<div class="results-section-label">Strong matches — ${strong.length} found</div>${strong.map(c => renderCard(c, 'strong')).join('')}`
    : '';

  const goodHtml = good.length > 0
    ? `<div class="results-section-label">Good matches — ${good.length} found</div>${good.map(c => renderCard(c, 'good')).join('')}`
    : '';

  const emptyHtml = strong.length === 0 && good.length === 0
    ? `<div class="no-results"><div class="no-results-title">No strong matches found</div><p>The current criteria didn't match any use cases closely. Try broadening your selections — especially the industry or problem type.</p></div>`
    : '';

  document.getElementById('wizard').innerHTML = `
    <div class="results-header">
      <div class="results-eyebrow">Use case recommendations</div>
      <div class="results-title">${strong.length + good.length} relevant examples found</div>
      <div class="results-summary">Based on your selections, here are the Flint initiatives most likely to resonate with your prospect. Strong matches share the same core problem and audience type.</div>
      <div class="selection-summary">${selChips}</div>
    </div>
    ${strongHtml}
    ${goodHtml}
    ${emptyHtml}
    <div class="restart-bar">
      <span class="restart-text">Looking for something different?</span>
      <button class="btn-restart" onclick="restart()">← Start over</button>
    </div>
  `;
}

function toggleExpand(customer, initiative, btn) {
  const key = customer + initiative;
  const id = `details-${customer.replace(/\s+/g,'-')}-${initiative.replace(/\s+/g,'-')}`;
  const el = document.getElementById(id);
  if (!el) return;
  if (expandedCards.has(key)) {
    expandedCards.delete(key);
    el.classList.remove('open');
    btn.textContent = '↓ Full detail';
  } else {
    expandedCards.add(key);
    el.classList.add('open');
    btn.textContent = '↑ Less detail';
  }
}

function restart() {
  answers = {};
  currentStep = 0;
  expandedCards = new Set();
  renderStep(0);
}

renderStep(0);
</script>
</body>
</html>
