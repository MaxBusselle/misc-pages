// ── Populate tag filter pills ──
const allTags = [...new Set(ASSETS.flatMap(a => a.tags))].sort();
const tagRow = document.getElementById('tag-filter-row');
let activeTag = null;

const allPill = document.createElement('button');
allPill.className = 'tag-pill active';
allPill.textContent = 'All';
allPill.dataset.tag = '';
tagRow.appendChild(allPill);

allTags.forEach(tag => {
  const pill = document.createElement('button');
  pill.className = 'tag-pill';
  pill.textContent = tag;
  pill.dataset.tag = tag;
  tagRow.appendChild(pill);
});

tagRow.addEventListener('click', e => {
  const pill = e.target.closest('.tag-pill');
  if (!pill) return;
  tagRow.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeTag = pill.dataset.tag || null;
  render();
});

// ── Populate client dropdown ──
const clients = [...new Set(ASSETS.map(a => a.client))].sort();
const clientSel = document.getElementById('filter-client');
clients.forEach(c => {
  const opt = document.createElement('option');
  opt.value = c;
  opt.textContent = c;
  clientSel.appendChild(opt);
});

// ── Sorting ──
let sortBy = 'date-desc';
document.getElementById('sort-by').addEventListener('change', e => {
  sortBy = e.target.value;
  render();
});

// ── Column header sorting ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    const sel = document.getElementById('sort-by');
    if (col === 'date') {
      sortBy = sortBy === 'date-desc' ? 'date-asc' : 'date-desc';
      sel.value = sortBy;
    } else if (col === 'client') {
      sortBy = 'client'; sel.value = 'client';
    } else if (col === 'title') {
      sortBy = 'title'; sel.value = 'title';
    }
    render();
  });
});

// ── Search ──
document.getElementById('search').addEventListener('input', render);
clientSel.addEventListener('change', render);

// ── Render ──
function render() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const clientFilter = document.getElementById('filter-client').value;
  const tbody = document.getElementById('table-body');

  let data = ASSETS.filter(a => {
    const matchQ = !query || 
      a.title.toLowerCase().includes(query) ||
      a.client.toLowerCase().includes(query) ||
      a.desc.toLowerCase().includes(query) ||
      a.tags.some(t => t.toLowerCase().includes(query));
    const matchC = !clientFilter || a.client === clientFilter;
    const matchT = !activeTag || a.tags.includes(activeTag);
    return matchQ && matchC && matchT;
  });

  // Sort
  data = [...data].sort((a, b) => {
    if (sortBy === 'date-desc') return b.date.localeCompare(a.date);
    if (sortBy === 'date-asc')  return a.date.localeCompare(b.date);
    if (sortBy === 'client')    return a.client.localeCompare(b.client) || b.date.localeCompare(a.date);
    if (sortBy === 'title')     return a.title.localeCompare(b.title);
    return 0;
  });

  tbody.innerHTML = '';
  document.getElementById('visible-count').textContent = data.length;
  document.getElementById('total-count').textContent = ASSETS.length;

  const noResults = document.getElementById('no-results');
  const table = document.getElementById('asset-table');

  if (data.length === 0) {
    noResults.style.display = 'block';
    table.style.display = 'none';
    return;
  }
  noResults.style.display = 'none';
  table.style.display = '';

  // Group headers for client sort
  let lastGroup = null;

  data.forEach(asset => {
    if (sortBy === 'client' && asset.client !== lastGroup) {
      lastGroup = asset.client;
      const groupRow = document.createElement('tr');
      groupRow.className = 'group-header';
      groupRow.innerHTML = `<td colspan="5">${asset.client}</td>`;
      tbody.appendChild(groupRow);
    }

    const [yr, mo, dy] = asset.date.split('-');
    const dateStr = `${mo}/${dy}/${yr.slice(2)}`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-date">${dateStr}</td>
      <td class="td-title">
        <a href="${BASE}${encodeURIComponent(asset.file)}" target="_blank" rel="noopener">${asset.title}</a>
        <div class="td-desc">${asset.desc}</div>
      </td>
      <td class="td-client">${asset.client}</td>
      <td class="td-tags">
        ${asset.tags.map(t => `<span class="tag${activeTag===t?' active':''}" data-tag="${t}">${t}</span>`).join('')}
      </td>
      <td class="td-link">
        <a href="${BASE}${encodeURIComponent(asset.file)}" target="_blank" rel="noopener" title="Open">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>
      </td>`;
    tbody.appendChild(tr);
  });

  // Click tag in row → filter
  tbody.querySelectorAll('.tag').forEach(t => {
    t.addEventListener('click', e => {
      e.stopPropagation();
      const tag = t.dataset.tag;
      activeTag = activeTag === tag ? null : tag;
      tagRow.querySelectorAll('.tag-pill').forEach(p => {
        p.classList.toggle('active', (!activeTag && p.dataset.tag === '') || p.dataset.tag === activeTag);
      });
      render();
    });
  });
}

render();
</script>
