<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Eyes — Activity Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef;
    --white: #ffffff;
    --ink: #1c1c1e;
    --muted: #6b6860;
    --rule: #ddd9d0;
    --accent: #1a3a5c;
    --accent-light: #e8eef5;
    --green: #2d6a4f;
    --green-light: #e8f5ee;
    --amber: #b45309;
    --amber-light: #fef3e2;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --tag: #e8e6e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .page-header {
    background: var(--accent);
    color: white;
    padding: 28px 40px 24px;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 6px;
  }

  .header-title {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.2;
  }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .hstat {
    text-align: right;
  }

  .hstat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }

  .hstat-label {
    font-size: 11px;
    opacity: 0.65;
  }

  /* FILTERS */
  .filters-bar {
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .filter-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .filter-select {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 5px 24px 5px 10px;
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236b6860'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    min-width: 140px;
  }

  .filter-select:focus { outline: none; border-color: var(--accent); }

  .filter-search {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 5px 10px;
    min-width: 180px;
  }

  .filter-search:focus { outline: none; border-color: var(--accent); }

  .filter-sep {
    width: 1px;
    height: 20px;
    background: var(--rule);
  }

  .results-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-left: auto;
  }

  .clear-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    background: none;
    border: 1px solid #c0cdd8;
    border-radius: 3px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
  }

  .clear-btn:hover { background: var(--accent-light); }

  /* TABLE */
  .table-wrap {
    padding: 24px 40px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    font-size: 12.5px;
  }

  thead tr {
    background: #f0eee8;
    border-bottom: 2px solid var(--rule);
  }

  th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    padding: 10px 14px;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }

  th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    opacity: 0.4;
    font-size: 8px;
  }

  th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--rule);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf9f6; }

  td {
    padding: 12px 14px;
    vertical-align: top;
    line-height: 1.45;
  }

  /* CELL TYPES */
  .cell-name {
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
  }

  .cell-title {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
  }

  .cell-manager {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .activity-pill {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .pill-walkthrough { background: var(--accent-light); color: var(--accent); }
  .pill-workorder   { background: var(--green-light);  color: var(--green); }
  .pill-longopen    { background: var(--amber-light);  color: var(--amber); }
  .pill-repetitive  { background: #f3e8ff; color: #6b21a8; }
  .pill-pattern     { background: #fef9c3; color: #854d0e; }
  .pill-zone        { background: #ffe4e6; color: #9f1239; }

  .diff-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    background: var(--tag);
    color: var(--muted);
  }

  .cell-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .outcome-text {
    font-size: 12px;
    color: #3a3830;
    line-height: 1.5;
    max-width: 240px;
  }

  .outcome-badge {
    display: inline-block;
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-bottom: 4px;
  }

  .outcome-done    { background: var(--green-light); color: var(--green); }
  .outcome-partial { background: var(--amber-light); color: var(--amber); }
  .outcome-missed  { background: var(--red-light);   color: var(--red); }

  .coach-text {
    font-size: 11.5px;
    color: #4a4640;
    line-height: 1.5;
    max-width: 300px;
  }

  .rating-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .rating-dots {
    display: flex;
    gap: 2px;
  }

  .rdot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--rule);
  }

  .rdot.filled { background: var(--accent); }
  .rdot.high   { background: var(--green); }
  .rdot.low    { background: var(--amber); }

  .rating-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* EMPTY STATE */
  .empty-row td {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>

</div>

const ACTIVITY_COLORS = {
  'Fresh Eyes Walkthrough': 'pill-walkthrough',
  'Keep Fresh Eyes During a Work Order Visit': 'pill-workorder',
  'Review a Long-Open Work Order': 'pill-longopen',
  'Catch the Repetitive Issue': 'pill-repetitive',
  'Spot the Pattern Before You Walk In': 'pill-pattern',
  'Focus on One Zone': 'pill-zone',
};

function outcomeClass(text) {
  if (!text) return null;
  const t = text.toLowerCase();
  if (t.includes('documented one or more') || t.includes('documented at least one') || t.includes('walked the zone')) return 'done';
  if (t.includes("didn't") || t.includes('no new items') || t.includes("didn't get") || t.includes('noticed something') || t.includes("didn't point")) return 'partial';
  if (t.includes('identified a recurring')) return 'partial';
  return 'done';
}

function outcomeBadgeClass(cls) {
  if (cls === 'done') return 'outcome-done';
  if (cls === 'partial') return 'outcome-partial';
  return 'outcome-missed';
}

function ratingDots(rating) {
  if (!rating) return '<span style="color:#ccc;font-size:11px">—</span>';
  const color = rating >= 8 ? 'high' : rating >= 5 ? 'filled' : 'low';
  let dots = '';
  for (let i = 1; i <= 10; i++) {
    dots += `<span class="rdot ${i <= rating ? color : ''}"></span>`;
  }
  return `<div class="rating-bar"><div class="rating-dots">${dots}</div><span class="rating-num">${rating}/10</span></div>`;
}

let sortCol = 'completed';
let sortDir = -1;
let filtered = [...DATA];

function populateFilters() {
  const managers = [...new Set(DATA.map(d => d.manager))].sort();
  const activities = [...new Set(DATA.map(d => d.activity))].sort();
  const titles = [...new Set(DATA.map(d => d.title))].sort();

  const mSel = document.getElementById('filter-manager');
  managers.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; mSel.appendChild(o); });

  const aSel = document.getElementById('filter-activity');
  activities.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; aSel.appendChild(o); });

  const tSel = document.getElementById('filter-title');
  titles.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tSel.appendChild(o); });
}

function applyFilters() {
  const manager = document.getElementById('filter-manager').value;
  const activity = document.getElementById('filter-activity').value;
  const title = document.getElementById('filter-title').value;
  const outcome = document.getElementById('filter-outcome').value;
  const search = document.getElementById('filter-search').value.toLowerCase().trim();

  filtered = DATA.filter(d => {
    if (manager && d.manager !== manager) return false;
    if (activity && d.activity !== activity) return false;
    if (title && d.title !== title) return false;
    if (search && !d.name.toLowerCase().includes(search)) return false;
    if (outcome) {
      const cls = outcomeClass(d.what_happened);
      if (outcome === 'done' && cls !== 'done') return false;
      if (outcome === 'partial' && cls !== 'partial') return false;
      if (outcome === 'missed' && cls !== 'missed') return false;
    }
    return true;
  });

  renderTable();
}

function clearFilters() {
  document.getElementById('filter-manager').value = '';
  document.getElementById('filter-activity').value = '';
  document.getElementById('filter-title').value = '';
  document.getElementById('filter-outcome').value = '';
  document.getElementById('filter-search').value = '';
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) { sortDir *= -1; }
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  renderTable();
}

function renderTable() {
  const sorted = [...filtered].sort((a, b) => {
    let av = a[sortCol] ?? '';
    let bv = b[sortCol] ?? '';
    if (typeof av === 'number' && typeof bv === 'number') return sortDir * (av - bv);
    if (av === null) av = '';
    if (bv === null) bv = '';
    return sortDir * String(av).localeCompare(String(bv));
  });

  const tbody = document.getElementById('table-body');
  document.getElementById('results-count').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

  if (sorted.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No results match the current filters.</td></tr>';
    return;
  }

  tbody.innerHTML = sorted.map(d => {
    const pillClass = ACTIVITY_COLORS[d.activity] || 'pill-walkthrough';
    const shortActivity = d.activity.replace('Keep Fresh Eyes During a ', '').replace('Review a ', '').replace('Spot the Pattern Before You Walk In', 'Spot the Pattern');
    const oCls = outcomeClass(d.what_happened);
    const oBadge = oCls ? `<div class="outcome-badge ${outcomeBadgeClass(oCls)}">${oCls === 'done' ? '✓ Documented' : oCls === 'partial' ? '~ Partial' : '✗ Not logged'}</div>` : '';
    const outcomeText = d.what_happened ? `<div class="outcome-text">${d.what_happened}</div>` : '<span style="color:#bbb;font-size:11px">—</span>';

    return `<tr>
      <td>
        <div class="cell-name">${d.name}</div>
        <div class="cell-title">${d.title}</div>
      </td>
      <td class="cell-manager">${d.manager}</td>
      <td>
        <span class="activity-pill ${pillClass}">${shortActivity}</span>
        <div style="margin-top:5px"><span class="diff-badge">Level ${d.difficulty}</span></div>
      </td>
      <td class="cell-date">${d.completed}</td>
      <td>${oBadge}${outcomeText}</td>
      <td>${ratingDots(d.self_rating)}</td>
      <td><div class="coach-text">${d.coach_summary || '—'}</div></td>
    </tr>`;
  }).join('');
}

populateFilters();
renderTable();
</script>
</body>
</html>
