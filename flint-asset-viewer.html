<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flint Asset Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andada+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sen:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --color-paper:      253 252 250;
    --color-surface:    255 255 255;
    --color-ink:        28 42 56;
    --color-muted-ink:  74 88 104;
    --color-accent:     232 77 40;
    --color-cool-grey:  154 166 176;
    --color-pale-grey:  235 229 220;
    --color-warm-line:  197 187 166;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: rgb(var(--color-paper));
    color: rgb(var(--color-ink));
    font-family: 'Sen', sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header bar ── */
  .header {
    background: rgb(var(--color-surface));
    border-bottom: 1px solid rgb(var(--color-pale-grey));
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    height: 52px;
  }

  .header-logo {
    font-family: 'Andada Pro', serif;
    font-weight: 400;
    font-size: 1rem;
    color: rgb(var(--color-ink));
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .header-logo span {
    color: rgb(var(--color-accent));
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: rgb(var(--color-pale-grey));
  }

  .header-title {
    font-family: 'Sen', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgb(var(--color-muted-ink));
  }

  /* ── Tab strip ── */
  .tab-strip {
    background: rgb(var(--color-surface));
    border-bottom: 1px solid rgb(var(--color-pale-grey));
    display: flex;
    align-items: flex-end;
    padding: 0 16px;
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 2px;
  }
  .tab-strip::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 10px 14px 9px;
    font-family: 'Sen', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: rgb(var(--color-muted-ink));
    cursor: pointer;
    white-space: nowrap;
    transition: color 150ms ease, border-color 150ms ease;
    position: relative;
    top: 1px;
  }

  .tab-btn:hover {
    color: rgb(var(--color-ink));
  }

  .tab-btn.active {
    color: rgb(var(--color-accent));
    border-bottom-color: rgb(var(--color-accent));
  }

  /* ── Tab number badge ── */
  .tab-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    background: rgb(var(--color-pale-grey));
    border-radius: 50%;
    font-size: 0.65rem;
    font-weight: 800;
    color: rgb(var(--color-muted-ink));
    margin-right: 6px;
    transition: background 150ms ease, color 150ms ease;
  }

  .tab-btn.active .tab-num {
    background: rgb(var(--color-accent) / 0.12);
    color: rgb(var(--color-accent));
  }

  /* ── Content area ── */
  .content-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .frame-wrap {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  .frame-wrap.active {
    opacity: 1;
    pointer-events: all;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Loading state ── */
  .loading-msg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 0.85rem;
    color: rgb(var(--color-muted-ink));
    font-family: 'Sen', sans-serif;
    pointer-events: none;
  }

  .loading-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgb(var(--color-accent));
    animation: pulse 1.2s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  ::selection {
    background: rgb(var(--color-accent));
    color: rgb(var(--color-paper));
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">flint<span>.</span></div>
  <div class="header-divider"></div>
  <div class="header-title">Asset Viewer</div>
</div>

<div class="tab-strip" id="tabStrip"></div>

<div class="content-area" id="contentArea">
  <div class="loading-msg" id="loadingMsg">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

const strip = document.getElementById('tabStrip');
const area  = document.getElementById('contentArea');
const loading = document.getElementById('loadingMsg');

const frames = [];
let active = -1;

TABS.forEach((tab, i) => {
  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.innerHTML = `<span class="tab-num">${i+1}</span>${tab.label}`;
  btn.addEventListener('click', () => showTab(i));
  strip.appendChild(btn);

  // Frame wrapper
  const wrap = document.createElement('div');
  wrap.className = 'frame-wrap';
  area.appendChild(wrap);

  frames.push({ btn, wrap, iframe: null, loaded: false });
});

function showTab(idx) {
  if (active === idx) return;
  active = idx;

  frames.forEach((f, i) => {
    f.btn.classList.toggle('active', i === idx);
    f.wrap.classList.toggle('active', i === idx);
  });

  const f = frames[idx];
  if (!f.loaded) {
    loading.style.display = 'flex';
    const iframe = document.createElement('iframe');
    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals';
    iframe.onload = () => {
      f.loaded = true;
      loading.style.display = 'none';
    };

    // Decode base64 and write as srcdoc
    const decoded = decodeURIComponent(
      atob(TABS[idx].b64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );
    iframe.srcdoc = decoded;
    f.wrap.appendChild(iframe);
    f.iframe = iframe;
  } else {
    loading.style.display = 'none';
  }
}

// Show first tab on load
showTab(0);
</script>
</body>
</html>
